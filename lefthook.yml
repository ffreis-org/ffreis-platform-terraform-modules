remotes:
  - git_url: https://github.com/FelipeFuhr/ffreis-platform-standards
    ref: main
    configs:
      - lefthook/base.yml
      - lefthook/terraform.yml

pre-commit:
  commands:
    validate:
      glob: "**/*.tf"
      run: make validate

pre-push:
  parallel: false
  commands:
    lint:
      run: make lint
    validate:
      run: make validate
