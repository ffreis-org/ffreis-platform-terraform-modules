remotes:
  - git_url: https://github.com/FelipeFuhr/ffreis-platform-standards
    ref: b6a9ef92199954e3da5b80814321cb92f649fb81
    configs:
      - lefthook/base.yml
      - lefthook/terraform.yml

pre-commit:
  commands:
    validate:
      glob: "**/*.tf"
      run: make validate

pre-push:
  parallel: false
  commands:
    lint:
      run: make lint
    validate:
      run: make validate
