name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
    types: [checks_requested]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── 1. Secret scan ─────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    permissions:
      contents: read
      actions: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gacts/gitleaks@9d471d3bda7ee95b6fa416fdfe7e87cf393554d5
        with:
          version: 8.24.3
          config-path: .gitleaks.toml
          path: .
          github-token: ${{ github.token }}

  # ── 2. Terraform fmt ────────────────────────────────────────────────────────
  fmt:
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-fmt.yml@e0cd54322d52fe7c522dd0bc2c46d56df2ceae43
    with:
      working-directory: "."

  # ── 3. Validate ─────────────────────────────────────────────────────────────
  validate:
    needs: [fmt]
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-validate.yml@e0cd54322d52fe7c522dd0bc2c46d56df2ceae43
    with:
      validate-all-modules: true
      modules-dir: "modules"

  # ── 4. Lint ─────────────────────────────────────────────────────────────────
  lint:
    needs: [fmt]
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-lint.yml@e0cd54322d52fe7c522dd0bc2c46d56df2ceae43

  # ── 5. Security (Trivy FINAL FIX - stable) ──────────────────────────────────
  security:
    needs: [fmt]
    name: Security (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # ✅ Robust install via official apt repo (no version guessing)
      - name: Install Trivy
        run: |
          set -euo pipefail

          sudo apt-get update -y
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg

          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list

          sudo apt-get update -y
          sudo apt-get install -y trivy

          trivy --version

      # ✅ Show findings (always prints)
      - name: Trivy config scan (table)
        id: trivy_scan
        continue-on-error: true
        run: |
          trivy config . \
            --severity HIGH,CRITICAL \
            --format table \
            --exit-code 1

      # ✅ SARIF for GitHub Security tab
      - name: Trivy config scan (SARIF)
        run: |
          trivy config . \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output trivy.sarif \
            --exit-code 0

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@d4b3ca9fa7f69d38bfcd667bdc45bc373d16277e
        with:
          sarif_file: trivy.sarif

      # ✅ Fail AFTER printing findings
      - name: Fail if Trivy found issues
        if: steps.trivy_scan.outcome == 'failure'
        run: |
          echo "❌ Trivy found HIGH/CRITICAL issues"
          exit 1

  # ── 6. Security (tfsec) ─────────────────────────────────────────────────────
  tfsec:
    needs: [fmt]
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-tfsec.yml@e0cd54322d52fe7c522dd0bc2c46d56df2ceae43

  # ── 7. Test module hygiene ──────────────────────────────────────────────────
  test-tidy:
    needs: [fmt]
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-test-tidy.yml@e0cd54322d52fe7c522dd0bc2c46d56df2ceae43
    with:
      go-version: "1.25.8"

  # ── 8. Terratest ────────────────────────────────────────────────────────────
  terratest:
    needs: [fmt]
    name: Terratest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34
        with:
          go-version: "1.25.8"
          cache-dependency-path: test/go.sum

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Download Go test dependencies
        run: cd test && go mod download

      - name: Run Terratest suite
        run: make test-ci
