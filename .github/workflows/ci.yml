name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── 1. Secret scan ─────────────────────────────────────────────────────────
  secret-scan:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 30
    name: Secret Scan
    permissions:
      contents: read
      actions: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gacts/gitleaks@9d471d3bda7ee95b6fa416fdfe7e87cf393554d5
        with:
          version: 8.24.3
          config-path: .gitleaks.toml
          path: .
          github-token: ${{ github.token }}

  # ── 2. Terraform fmt ────────────────────────────────────────────────────────
  fmt:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-fmt.yml@1b59a920b1b4b226f3e5a91eb9042827b9c435cb
    with:
      working-directory: "."

  # ── 3. Validate ─────────────────────────────────────────────────────────────
  validate:
    needs: [fmt]
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-validate.yml@1b59a920b1b4b226f3e5a91eb9042827b9c435cb
    with:
      validate-all-modules: true
      modules-dir: "modules"

  # ── 4. Lint ─────────────────────────────────────────────────────────────────
  lint:
    needs: [fmt]
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-lint.yml@1b59a920b1b4b226f3e5a91eb9042827b9c435cb

  # ── 5. Security (Trivy FINAL FIX - stable) ──────────────────────────────────
  security:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 30
    needs: [fmt]
    name: Security (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # ✅ Robust install via official apt repo (no version guessing)
      - name: Install Trivy
        run: |
          set -euo pipefail

          sudo apt-get update -y
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg

          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list

          sudo apt-get update -y
          sudo apt-get install -y trivy

          trivy --version

      # ✅ Show findings (always prints)
      - name: Trivy config scan (table)
        id: trivy_scan
        continue-on-error: true
        run: |
          trivy config . \
            --severity HIGH,CRITICAL \
            --format table \
            --exit-code 1

      # ✅ SARIF for GitHub Security tab
      - name: Trivy config scan (SARIF)
        run: |
          trivy config . \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output trivy.sarif \
            --exit-code 0

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7
        with:
          sarif_file: trivy.sarif

      # ✅ Fail AFTER printing findings
      - name: Fail if Trivy found issues
        if: steps.trivy_scan.outcome == 'failure'
        run: |
          echo "❌ Trivy found HIGH/CRITICAL issues"
          exit 1

  # ── 6. Security (tfsec) ─────────────────────────────────────────────────────
  tfsec:
    needs: [fmt]
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-tfsec.yml@1b59a920b1b4b226f3e5a91eb9042827b9c435cb

  # ── 7. Test module hygiene ──────────────────────────────────────────────────
  test-tidy:
    if: ${{ !github.event.pull_request.draft }}
    needs: [fmt]
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-test-tidy.yml@1b59a920b1b4b226f3e5a91eb9042827b9c435cb
    with:
      go-version: "1.25.8"

  # ── 8. Terratest ────────────────────────────────────────────────────────────
  terratest:
    timeout-minutes: 30
    if: ${{ !github.event.pull_request.draft }}
    needs: [fmt]
    name: Terratest
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.25.8"
          cache-dependency-path: test/go.sum

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Download Go test dependencies
        run: cd test && go mod download

      - name: Run Terratest suite
        run: make test-ci

  # ── 9. Python Lambda lint + test ─────────────────────────────────────────────
  # Modules that ship a Python Lambda (modules/*/lambda/) are otherwise covered
  # only by Terraform validation — this lints and unit-tests the handler code.
  python-lambdas:
    timeout-minutes: 15
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    name: Python Lambda lint + test
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install --quiet "ruff==0.15.12" pytest boto3

      - name: Lint + test each module Lambda
        run: |
          set -euo pipefail
          mapfile -t dirs < <(find modules -type d -name lambda | sort)
          if [ "${#dirs[@]}" -eq 0 ]; then echo "no python lambda dirs"; exit 0; fi
          for d in "${dirs[@]}"; do
            echo "::group::${d}"
            ruff check "${d}"
            if ls "${d}"/test_*.py >/dev/null 2>&1; then
              (cd "${d}" && python -m pytest -q)
            else
              echo "WARNING: ${d} has no unit tests"
            fi
            echo "::endgroup::"
          done
