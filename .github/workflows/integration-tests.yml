name: Integration Tests (Terratest)

# Integration tests deploy real AWS resources and destroy them after.
# They run:
#   - Manually via workflow_dispatch (for on-demand validation)
#   - On push to main (post-merge gate)
#
# They do NOT run on pull_request to avoid giving fork PRs AWS access.
# Required secrets: AWS_TEST_ROLE_ARN (IAM role Terratest assumes via OIDC).
# Optional: AWS_TEST_REGION (default: us-east-1).

on:
  push:
    branches: [main]
    paths:
      - "modules/**"
      - "test/**"
      - ".github/workflows/integration-tests.yml"
  workflow_dispatch:
    inputs:
      test_filter:
        description: "Go -run filter (leave empty for all tests)"
        required: false
        default: ""

permissions:
  id-token: write   # Required for OIDC → AWS credential exchange
  contents: read

concurrency:
  # Only one integration test run at a time — they create real AWS resources.
  group: integration-tests
  cancel-in-progress: false   # Don't cancel; a partial run may leave orphaned resources

env:
  GO_VERSION: "1.25.8"
  TF_VERSION: "1.9.8"
  AWS_TEST_REGION: "us-east-1"

jobs:
  terratest:
    name: Terratest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Go setup ────────────────────────────────────────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: test/go.sum

      - name: Download Go test dependencies
        run: cd test && go mod download

      # ── Terraform setup ─────────────────────────────────────────────────────
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          # Disable the wrapper so terraform.Output() returns clean strings.
          terraform_wrapper: false

      # ── AWS credentials (OIDC — no static keys) ─────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_TEST_ROLE_ARN }}
          aws-region: ${{ env.AWS_TEST_REGION }}
          role-session-name: terratest-${{ github.run_id }}

      # ── Run tests ────────────────────────────────────────────────────────────
      - name: Run Terratest
        env:
          AWS_TEST_REGION: ${{ env.AWS_TEST_REGION }}
        run: |
          FILTER="${{ github.event.inputs.test_filter }}"
          if [ -n "$FILTER" ]; then
            cd test && go test -v -timeout 30m -count=1 -run "$FILTER" ./...
          else
            make test-integration
          fi

      # ── Emergency cleanup ────────────────────────────────────────────────────
      # If tests crash without running defer terraform.Destroy, tag-based cleanup
      # can find orphaned resources via the "ManagedBy=terratest" tag.
      - name: List potentially orphaned test resources (on failure)
        if: failure()
        run: |
          echo "Listing resources tagged ManagedBy=terratest in ${{ env.AWS_TEST_REGION }}..."
          aws resourcegroupstaggingapi get-resources \
            --tag-filters Key=ManagedBy,Values=terratest \
            --region "${{ env.AWS_TEST_REGION }}" \
            --query 'ResourceTagMappingList[].ResourceARN' \
            --output text || echo "(no resources found or API error)"
