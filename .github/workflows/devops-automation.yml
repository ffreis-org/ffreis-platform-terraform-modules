name: DevOps / Automation

on:
  schedule:
    - cron: "51 20 21 * *"  # monthly scattered (was: 0 3 * * 0)
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scorecard:
    if: vars.SCORECARD_ENABLED == 'true' && github.event_name != 'pull_request'
    permissions:
      contents: read
      actions: read
      security-events: write
      id-token: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-scorecard.yml@a02d736d25fa99fca8b4b623af9467d7afc472a4
    with:
      upload-sarif: true

  stale:
    if: vars.STALE_ENABLED == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-stale.yml@caa797cc7baec52e99f21b86f532a4b7c88cf4fa # fix/grype-install-outside-scan-path
    with:
      only: "both"

  release-please:
    if: vars.RELEASE_PLEASE_ENABLED == 'true' && github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-release-please.yml@caa797cc7baec52e99f21b86f532a4b7c88cf4fa # fix/grype-install-outside-scan-path
    with:
      target-branch: "main"
    secrets:
      RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}

