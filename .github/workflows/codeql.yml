name: Code Scanning (CodeQL)

on:
  merge_group:
    types: [checks_requested]
    branches: [main, master]
  schedule:
    - cron: "0 3 * * 0" # Sundays 03:00 UTC

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    # Run CodeQL by default; allow opting out with a repo variable:
    #   CODEQL_ENABLED=false
    if: vars.CODEQL_ENABLED != 'false'
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@01e2b12e992621fecf074b8a202f66044196f3bf
    with:
      # This repository is primarily Terraform modules; CodeQL supports scanning
      # GitHub Actions workflows as `language: actions`.
      languages: "actions"
      source-root: "."
