name: Code Scanning (CodeQL)

on:
  merge_group:
    types: [checks_requested]
    branches: [main, master]
  schedule:
    - cron: "0 3 * * 0" # Sundays 03:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    # Run CodeQL by default; allow opting out with a repo variable:
    #   CODEQL_ENABLED=false
    if: vars.CODEQL_ENABLED != 'false'
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@a02d736d25fa99fca8b4b623af9467d7afc472a4
    with:
      # This repository is primarily Terraform modules; CodeQL supports scanning
      # GitHub Actions workflows as `language: actions`.
      languages: "actions"
      source-root: "."
