name: DevOps / Terraform Checks

on:
  pull_request:
    paths:
      - "**/*.tf"
      - ".github/workflows/**"
  merge_group:
    types: [checks_requested]
    branches: [main, master]
  push:
    branches: [main, master]
    paths:
      - "**/*.tf"
      - ".github/workflows/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-fmt.yml@e0cd54322d52fe7c522dd0bc2c46d56df2ceae43
    with:
      working-directory: "."

  validate:
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-validate.yml@e0cd54322d52fe7c522dd0bc2c46d56df2ceae43
    needs: [fmt]
    with:
      validate-all-modules: true
      modules-dir: "modules"

  lint:
    needs: [fmt]
    name: Lint (tflint)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: terraform-linters/setup-tflint@eb0f7c1b77f191dee552664e7884849ce3dd5176
        with:
          tflint_version: v0.50.3
          cache: true
          tflint_config_path: .tflint.hcl

      - name: Init TFLint
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: tflint --init

      - name: Run TFLint
        working-directory: .
        run: tflint --recursive --format compact

  trivy-config:
    needs: [fmt]
    name: Trivy (Terraform config)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Trivy findings (table)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "0"
          format: table
          output: trivy.txt
          hide-progress: true

      - name: Publish Trivy findings to summary
        if: always()
        run: |
          if [[ -s trivy.txt ]]; then
            {
              echo "### Trivy findings"
              echo ""
              echo "<pre>"
              cat trivy.txt
              echo "</pre>"
            } >> "$GITHUB_STEP_SUMMARY"
            cat trivy.txt
          else
            echo "No Trivy findings were written to trivy.txt"
          fi

      - name: Trivy config scan (SARIF)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: sarif
          output: trivy.sarif
          hide-progress: true
          limit-severities-for-sarif: true
          skip-setup-trivy: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: trivy.sarif

  tfsec:
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-tfsec.yml@e0cd54322d52fe7c522dd0bc2c46d56df2ceae43
    needs: [fmt]
    with:
      scan-path: "."
      minimum-severity: "HIGH"
      soft-fail: false

  checkov:
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-checkov.yml@e0cd54322d52fe7c522dd0bc2c46d56df2ceae43
    needs: [fmt]
    with:
      scan-directory: "."
      framework: "terraform"
      soft-fail: false

  semgrep:
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-semgrep.yml@e0cd54322d52fe7c522dd0bc2c46d56df2ceae43
    needs: [fmt]
    with:
      working-directory: "."
      config: "p/terraform"
