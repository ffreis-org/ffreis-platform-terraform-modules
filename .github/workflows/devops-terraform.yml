name: DevOps / Terraform Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "**/*.tf"
      - ".github/workflows/**"
  merge_group:
    types: [checks_requested]
    branches: [main, master]
  push:
    branches: [main, master]
    paths:
      - "**/*.tf"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-fmt.yml@e0cd54322d52fe7c522dd0bc2c46d56df2ceae43
    with:
      working-directory: "."

  validate:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-validate.yml@e0cd54322d52fe7c522dd0bc2c46d56df2ceae43
    needs: [fmt]
    with:
      validate-all-modules: true
      modules-dir: "modules"

  lint:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 15
    needs: [fmt]
    name: Lint (tflint)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: terraform-linters/setup-tflint@eb0f7c1b77f191dee552664e7884849ce3dd5176
        with:
          tflint_version: v0.50.3
          cache: true
          tflint_config_path: .tflint.hcl

      - name: Init TFLint
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: tflint --init

      - name: Run TFLint
        working-directory: .
        run: tflint --recursive --format compact

  trivy-config:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 30
    needs: [fmt]
    name: Trivy (Terraform config)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Trivy findings (table)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "0"
          format: table
          output: trivy.txt
          hide-progress: true

      - name: Publish Trivy findings to summary
        if: always()
        run: |
          if [[ -s trivy.txt ]]; then
            {
              echo "### Trivy findings"
              echo ""
              echo "<pre>"
              cat trivy.txt
              echo "</pre>"
            } >> "$GITHUB_STEP_SUMMARY"
            cat trivy.txt
          else
            echo "No Trivy findings were written to trivy.txt"
          fi

      - name: Trivy config scan (SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: sarif
          output: trivy.sarif
          hide-progress: true
          limit-severities-for-sarif: true
          skip-setup-trivy: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7
        with:
          sarif_file: trivy.sarif

  tfsec:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-tfsec.yml@e0cd54322d52fe7c522dd0bc2c46d56df2ceae43
    needs: [fmt]
    with:
      scan-path: "."
      soft-fail: false

  checkov:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-checkov.yml@e0cd54322d52fe7c522dd0bc2c46d56df2ceae43
    needs: [fmt]
    with:
      scan-directory: "."
      framework: "terraform"
      soft-fail: false

  semgrep:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-semgrep.yml@e0cd54322d52fe7c522dd0bc2c46d56df2ceae43
    needs: [fmt]
    with:
      working-directory: "."
      config: "p/terraform"
