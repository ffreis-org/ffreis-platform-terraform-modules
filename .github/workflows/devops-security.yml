name: DevOps / Security

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]
    branches: [main, master]
  push:
    branches: [main, master]
  schedule:
    - cron: "3 12 3 * *"  # monthly scattered (was: 0 6 * * 1)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    # Skip heavy vuln scanners (trivy/grype/osv) on docs-only changes.
    # gitleaks still runs on everything — secrets can hide in markdown too.
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '!**/*.md'
              - '!docs/**'

  gitleaks:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-gitleaks.yml@a02d736d25fa99fca8b4b623af9467d7afc472a4
    with:
      working-directory: "."
      scan-history: true
      upload-sarif: false

  # TODO: update SHA to the ffreis-workflows-terraform commit that added SARIF support to tf-security.yml
  trivy-config:
    permissions:
      contents: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-security.yml@b9644b0bafb7fd4eb3d74ccb8b8ee8818e111079
    with:
      scan-ref: "."
      upload-sarif: false

  grype-fs:
    needs: changes
    if: |
      always() && (
        needs.changes.result == 'skipped' ||
        needs.changes.outputs.code == 'true'
      )
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-scan-grype-fs.yml@caa797cc7baec52e99f21b86f532a4b7c88cf4fa # fix/grype-install-outside-scan-path
    with:
      path: "."
      upload-sarif: false

  osv:
    needs: changes
    if: |
      always() && (
        needs.changes.result == 'skipped' ||
        needs.changes.outputs.code == 'true'
      )
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-osv-scanner.yml@caa797cc7baec52e99f21b86f532a4b7c88cf4fa # fix/grype-install-outside-scan-path
    with:
      working-directory: "."
      upload-sarif: false
